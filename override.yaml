kvmd:
  msd:
    type: disabled
  streamer:
    quality: 0
    desired_fps: 30
    resolution:
      default: 1920x1080
      available:
        - 1920x1080
        - 1600x1200
        - 1360x768
        - 1280x1024
        - 1280x960
        - 1280x720
        - 1024x768
        - 800x600
        - 720x576
        - 720x480
        - 640x480
    h264_bitrate:
      default: 5000
    cmd_append:
      - "--jpeg-sink=kvmd::ustreamer::jpeg"
      - "--jpeg-sink-mode=0660"
      - "--h264-sink=kvmd::ustreamer::h264"
      - "--h264-sink-mode=0660"
      - "--h264-bitrate={h264_bitrate}"
      - "--h264-gop={h264_gop}"
      - "--device-timeout=25"
      - "--h264-m2m-device=/dev/video11"
  info:
    hw:
      vcgencmd_cmd:
        - /usr/local/bin/vcgencmd-container-shim
  hid:
    mouse:
      device: /dev/kvmd-hid-mouse
    keyboard:
      device: /dev/kvmd-hid-keyboard
media:
  memsink:
    jpeg:
      sink: "kvmd::ustreamer::jpeg"
    h264:
      sink: "kvmd::ustreamer::h264"
